<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="道场">
<link rel="manifest" href="/static/manifest.json">
<title>数字道场</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── Loading Screen ── */
#loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease-out}
#loading-overlay.hide{opacity:0;pointer-events:none}
#loading-ring{width:40px;height:40px;border:1.5px solid var(--gold);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
#loading-text{font-family:'Times New Roman','Noto Serif SC',serif;font-size:11px;color:var(--mu);letter-spacing:4px}
:root{--bg:#F8F6F2;--sur:#FFFDF9;--ink:#1C1C1C;--mu:#999;--ln:#E6E2DA;--fail:#B54A4A;--ok:#4A7C59;--gold:#A6956C;--gl:rgba(166,149,108,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Times New Roman','Noto Serif SC','Songti SC',serif;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
.page{display:none;padding:0 20px 90px;min-height:100vh;max-width:480px;margin:0 auto}
.page.on{display:block}
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(248,246,242,.9);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-top:0.5px solid var(--ln);display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,6px);z-index:100}
nav button{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 16px;background:none;border:none;color:var(--mu);font-size:10px;cursor:pointer;letter-spacing:2px;font-family:inherit;transition:color .3s}
nav button.on{color:var(--ink)}
nav button svg{width:17px;height:17px;margin-bottom:2px;opacity:.65}
nav button.on svg{opacity:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes inkReveal{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0 0 0)}}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(166,149,108,.12)}50%{box-shadow:0 0 0 5px rgba(166,149,108,0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes drawLine{from{width:0}to{width:28px}}
.card{background:var(--sur);padding:20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);animation:fadeUp .5s ease-out}
.quote-block{background:var(--sur);padding:28px 20px 24px;text-align:center;margin-bottom:20px;position:relative;border:0.5px solid var(--ln);animation:fadeUp .6s ease-out}
.quote-block::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:1px;background:var(--gold);animation:drawLine .8s .2s ease-out both}
.quote-badge{display:inline-block;font-size:9px;color:var(--gold);letter-spacing:4px;margin-bottom:16px;padding:0;border:none;background:none}
.quote-text{font-family:'Times New Roman','Noto Serif SC','Songti SC',serif;font-size:18px;line-height:2;letter-spacing:1px;color:var(--ink);font-weight:400;animation:inkReveal .8s .3s ease-out both}
.quote-src{font-size:10px;color:var(--mu);margin-top:14px;letter-spacing:2px}
.quote-src::before{content:'— ';color:var(--gold)}
.chrono-strip{display:flex;flex-direction:column;align-items:center;gap:0;padding:8px 0 0;margin-bottom:20px}
.chrono-btn{display:flex;align-items:center;justify-content:center;gap:14px;padding:12px 28px;background:var(--sur);border:0.5px solid var(--ln);cursor:pointer;transition:all .35s;min-width:170px;font-family:inherit;animation:fadeUp .5s ease-out}
.chrono-btn:first-of-type{margin-bottom:8px;animation:fadeUp .5s .05s ease-out both}
.chrono-btn:hover{border-color:var(--ink);animation:breathe 2s ease-in-out infinite}
.chrono-btn:active{background:var(--bg)}
.chrono-label{font-size:11px;color:var(--mu);letter-spacing:4px;font-family:inherit}
.chrono-time{font-size:22px;color:var(--ink);font-weight:400;font-variant-numeric:tabular-nums;font-family:'SF Mono','Menlo',monospace;letter-spacing:2px}
.realm-badge{text-align:center;font-size:10px;color:var(--gold);letter-spacing:8px;padding:16px 0 8px}
.realm-badge span{color:var(--ink);font-weight:500}
.task-row{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:0.5px solid var(--ln);transition:all .5s cubic-bezier(.4,0,.2,1);animation:fadeUp .4s ease-out backwards}
.task-row:nth-child(1){animation-delay:.05s}.task-row:nth-child(2){animation-delay:.1s}.task-row:nth-child(3){animation-delay:.15s}.task-row:nth-child(4){animation-delay:.2s}.task-row:nth-child(5){animation-delay:.25s}
.task-row.done{opacity:0;max-height:0;padding:0;border-width:0;overflow:hidden;margin:0}
.task-info{flex:1;min-width:0}
.task-title{font-size:15px;line-height:1.5}
.task-meta{font-size:10px;color:var(--mu);margin-top:2px;display:flex;gap:8px}
.act-check{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--ln);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.act-check:hover{border-color:var(--ok);background:rgba(58,125,68,.06)}
.act-check:disabled{opacity:.3;pointer-events:none}
.act-fail{width:28px;height:28px;border:none;background:none;color:var(--mu);font-size:11px;cursor:pointer;flex-shrink:0;letter-spacing:.5px;transition:color .2s}
.act-fail:hover{color:var(--fail)}
.act-del{width:28px;height:28px;border:none;background:none;color:var(--mu);font-size:16px;cursor:pointer;flex-shrink:0;transition:color .2s;line-height:1}
.act-del:hover{color:var(--fail)}
.modal-bg{position:fixed;inset:0;background:rgba(28,28,30,.25);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-bg.hidden{display:none}
.modal-sheet{background:var(--sur);padding:28px 24px 44px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;box-shadow:0 -8px 32px rgba(0,0,0,.08);animation:slideUp .3s ease-out}
.modal-sheet h2{font-size:16px;font-weight:400;margin-bottom:20px;letter-spacing:3px;color:var(--ink)}
input,select,textarea{font-family:inherit;font-size:15px}
.form-input{width:100%;border:none;border-bottom:1px solid var(--ln);padding:10px 0;outline:none;background:transparent;transition:border-color .2s}
.form-input:focus{border-color:var(--ink)}
.scope-tabs{display:flex;gap:0;margin-bottom:16px;border-radius:6px;overflow:hidden;border:1px solid var(--ln)}
.scope-tab{flex:1;padding:8px;text-align:center;font-size:11px;background:none;border:none;border-right:1px solid var(--ln);cursor:pointer;color:var(--mu);letter-spacing:.5px;transition:all .15s}
.scope-tab:last-child{border-right:none}
.scope-tab.sel{background:var(--ink);color:var(--sur)}
.toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--sur);padding:10px 28px;font-size:12px;letter-spacing:2px;z-index:999;opacity:0;transition:all .4s;pointer-events:none;font-family:inherit}
.toast.on{opacity:1}
.empty{text-align:center;padding:40px 20px;color:var(--mu);font-size:13px;line-height:1.8}
.dom-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.range-tabs{display:flex;gap:4px;margin-bottom:16px}
.range-tab{padding:4px 12px;border:1px solid var(--ln);border-radius:14px;background:none;font-size:10px;color:var(--mu);cursor:pointer;letter-spacing:.5px}
.range-tab.sel{background:var(--ink);color:var(--sur);border-color:var(--ink)}
@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:in .4s ease-out}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading-overlay">
  <div id="loading-ring"></div>
  <div id="loading-text">载入中</div>
</div>

<!-- ═══════════ HOME ═══════════ -->
<div id="pg-home" class="page on">
  <div class="quote-block fade-in">
    <p id="home-quote-badge" class="quote-badge">—</p>
    <p id="home-quote" class="quote-text">天行健，君子以自强不息。</p>
    <p id="home-quote-src" class="quote-src">— 周易</p>
  </div>
  <div class="chrono-strip">
    <div id="classical-date" style="text-align:center;font-family:Georgia,'Noto Serif SC',serif;font-size:13px;color:var(--mu);letter-spacing:1px;margin-bottom:10px;line-height:1.6">
      <span id="lunar-date">—</span>
    </div>
    <div id="chrono-streak" style="text-align:center;display:flex;justify-content:center;gap:20px;margin-bottom:6px">
      <span style="font-size:10px;color:var(--mu);letter-spacing:1px">早起<span id="streak-wake" style="color:var(--ink);font-weight:500;margin-left:4px">—</span>天</span>
      <span style="font-size:10px;color:var(--mu);letter-spacing:1px">安寝<span id="streak-sleep" style="color:var(--ink);font-weight:500;margin-left:4px">—</span>天</span>
    </div>
    <button class="chrono-btn" onclick="openChronoModal('wake')" title="记录起床时间">
      <span class="chrono-label">起</span>
      <span class="chrono-time" id="t-wake">--:--</span>
    </button>
    <button class="chrono-btn" onclick="openChronoModal('sleep')" title="记录入睡时间">
      <span class="chrono-label">寐</span>
      <span class="chrono-time" id="t-sleep">--:--</span>
    </button>
  </div>
  <div style="text-align:center;font-size:10px;color:var(--mu);margin-top:2px">
    <span id="chrono-summary"></span>
  </div>
  <div class="realm-badge" id="realm-badge" style="cursor:default;user-select:none" title="">境界 · <span id="t-realm">未入门</span></div>
  <div style="margin-top:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:11px;color:var(--mu);letter-spacing:2px;text-transform:uppercase">今 日</span>
      <span id="task-progress" style="font-size:10px;color:var(--mu)"></span>
    </div>
    <div style="height:1px;background:linear-gradient(90deg,transparent,rgba(28,28,30,.1) 20%,rgba(28,28,30,.1) 80%,transparent);margin-bottom:6px"></div>
    <div id="task-list"></div>
    <div id="task-empty" class="empty">尚无任务<br><span style="font-size:11px">点击底部 + 添加</span></div>
  </div>
  <div style="height:40px"></div>
</div>

<!-- ═══════════ ANALYTICS ═══════════ -->
<div id="pg-analytics" class="page">
  <h2 style="font-size:15px;font-weight:500;letter-spacing:2px;padding:20px 0 4px">内 省 看 板</h2>
  <div style="height:1px;background:linear-gradient(90deg,rgba(28,28,30,.12),transparent 70%);margin-bottom:12px"></div>
  <div class="range-tabs">
    <button class="range-tab sel" data-range="7" onclick="setRange(7,this)">7天</button>
    <button class="range-tab" data-range="30" onclick="setRange(30,this)">30天</button>
    <button class="range-tab" data-range="90" onclick="setRange(90,this)">90天</button>
    <button class="range-tab" data-range="365" onclick="setRange(365,this)">1年</button>
  </div>
  <div id="analytics-content" class="empty">打卡数据积累后自动生成</div>
</div>

<!-- ═══════════ VOICE ═══════════ -->
<div id="pg-voice" class="page">
  <h2 style="font-size:15px;font-weight:500;letter-spacing:2px;padding:20px 0 4px">内 省 录 音</h2>
  <div style="height:1px;background:linear-gradient(90deg,rgba(28,28,30,.12),transparent 70%);margin-bottom:12px"></div>
  <div style="display:flex;flex-direction:column;align-items:center;padding:24px 0">
    <button id="record-btn" onclick="toggleRecording()" style="width:72px;height:72px;border-radius:50%;border:1.5px solid var(--ln);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s">
      <svg id="mic-on" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--mu)" stroke-width="1.2"><rect x="9" y="1" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      <div id="mic-spin" style="display:none;width:24px;height:24px;border:2px solid var(--mu);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite"></div>
    </button>
    <p id="rec-label" style="font-size:11px;color:var(--mu);margin-top:8px">点击录音</p>
    <div id="rec-result" style="display:none;text-align:center;max-width:280px;margin-top:16px;padding:16px;background:var(--sur);border-radius:8px"></div>
  </div>
  <div style="border-top:1px solid var(--ln);padding-top:16px">
    <p style="font-size:10px;color:var(--mu);letter-spacing:1px;margin-bottom:8px">历史</p>
    <div id="voice-logs"></div>
    <p id="voice-empty" style="font-size:12px;color:var(--mu);text-align:center;padding:16px">暂无</p>
  </div>
</div>

<!-- ═══════════ GOALS ═══════════ -->
<!-- v1.1: 长期目标已隐藏
<div id="pg-goals" class="page">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 0 16px">
    <h2 style="font-size:15px;font-weight:500;letter-spacing:2px">长 期 目 标</h2>
    <button onclick="openGoalModal()" style="font-size:13px;color:var(--ink);background:none;border:none;cursor:pointer;letter-spacing:.5px">+ 新建</button>
  </div>
  <div id="goals-list"></div>
  <div id="goals-empty" class="empty">暂无长期目标<br><span style="font-size:11px">设定目标后系统自动拆分为每日任务</span></div>
</div>
-->
</div>

<!-- ═══════════ NAV ═══════════ -->
<nav>
  <button class="on" data-pg="home" onclick="navTo('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/></svg>主页
  </button>
  <button data-pg="analytics" onclick="navTo('analytics')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>看板
  </button>
  <button data-pg="voice" onclick="navTo('voice')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>录音
  </button>
  <!-- v1.1: 长期目标已隐藏
  <button data-pg="goals" onclick="navTo('goals')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>目标
  </button>
  -->
  <button onclick="openTaskModal()" style="display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 14px;background:none;border:none;color:var(--ink);font-size:10px;cursor:pointer">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>事件
  </button>
</nav>

<!-- ═══════════ TASK MODAL ═══════════ -->
<div id="task-modal" class="modal-bg hidden" onclick="if(event.target===this)closeTaskModal()">
  <div class="modal-sheet">
    <h2>新增事件</h2>
    <input id="tm-title" class="form-input" type="text" placeholder="事件名称" maxlength="128" style="margin-bottom:16px">
    <div class="scope-tabs">
      <button class="scope-tab sel" data-scope="short_term" onclick="setScope('short_term',this)">短期 · 今日</button>
      <button class="scope-tab" data-scope="long_term" onclick="setScope('long_term',this)">长期 · 日期段</button>
      <button class="scope-tab" data-scope="semi_permanent" onclick="setScope('semi_permanent',this)">半永久</button>
    </div>
    <div id="tm-dates" style="display:none;margin-bottom:12px">
      <div style="display:flex;gap:8px;align-items:center">
        <input type="date" id="tm-start" class="form-input" style="flex:1;font-size:13px">
        <span style="color:var(--mu);font-size:12px">至</span>
        <input type="date" id="tm-end" class="form-input" style="flex:1;font-size:13px">
      </div>
    </div>
    <select id="tm-domain" class="form-input" style="margin-bottom:20px">
      <option value="study">修学</option><option value="health">养生</option>
      <option value="skill">技艺</option><option value="project">事功</option><option value="social">人伦</option>
    </select>
    <button onclick="createTask()" style="width:100%;padding:14px;background:var(--ink);color:var(--sur);border:none;border-radius:8px;font-size:15px;letter-spacing:2px;cursor:pointer">添加事件</button>
    <button onclick="closeTaskModal();openDeleteModal()" style="width:100%;padding:12px;background:none;border:1px solid var(--ln);color:var(--mu);font-size:13px;cursor:pointer;margin-top:8px;border-radius:8px">删除已有事件 →</button>
    <button onclick="closeTaskModal()" style="width:100%;padding:12px;background:none;border:none;color:var(--mu);font-size:13px;cursor:pointer;margin-top:4px">取消</button>
  </div>
</div>

<!-- ═══════════ ADMIN PANEL ═══════════ -->
<div id="admin-modal" class="modal-bg hidden" onclick="if(event.target===this)closeAdminModal()">
  <div class="modal-sheet" style="max-height:90vh">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 style="margin:0">管理者</h2>
      <button onclick="closeAdminModal()" style="background:none;border:none;color:var(--mu);font-size:20px;cursor:pointer">&times;</button>
    </div>
    <!-- Chrono override -->
    <div style="border:0.5px solid var(--ln);padding:16px;margin-bottom:16px">
      <p style="font-size:11px;color:var(--mu);letter-spacing:2px;margin-bottom:12px">作息时间修改</p>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <span style="font-size:12px;min-width:40px">日期</span>
        <input type="date" id="adm-date" class="form-input" style="flex:1;font-size:13px">
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <span style="font-size:12px;min-width:40px">起床</span>
        <input type="time" id="adm-wake" class="form-input" style="flex:1;font-size:13px">
        <button onclick="adminSetChrono('wake')" style="padding:8px 16px;background:var(--ink);color:var(--sur);border:none;font-size:11px;cursor:pointer;letter-spacing:1px">更新</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <span style="font-size:12px;min-width:40px">入睡</span>
        <input type="time" id="adm-sleep" class="form-input" style="flex:1;font-size:13px">
        <button onclick="adminSetChrono('sleep')" style="padding:8px 16px;background:var(--ink);color:var(--sur);border:none;font-size:11px;cursor:pointer;letter-spacing:1px">更新</button>
      </div>
    </div>
    <!-- Task undo -->
    <div style="border:0.5px solid var(--ln);padding:16px;margin-bottom:12px" id="admin-undo-box">
      <p style="font-size:11px;color:var(--mu);letter-spacing:2px;margin-bottom:12px">撤销已完成任务</p>
      <div id="admin-undo-list" style="max-height:180px;overflow-y:auto"></div>
    </div>
    <!-- Voice management -->
    <details style="border:0.5px solid var(--ln);padding:16px;margin-bottom:12px">
      <summary style="font-size:11px;color:var(--mu);letter-spacing:2px;cursor:pointer">管理录音记录</summary>
      <div id="admin-voice-list" style="max-height:250px;overflow-y:auto;margin-top:12px"></div>
    </details>
    <!-- Quick actions -->
    <div style="border:0.5px solid var(--ln);padding:16px;margin-bottom:16px">
      <p style="font-size:11px;color:var(--mu);letter-spacing:2px;margin-bottom:12px">快捷操作</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <button onclick="adminForceRecalc()" style="padding:8px 14px;background:none;border:0.5px solid var(--ln);font-size:11px;cursor:pointer;font-family:inherit">重算功过格</button>

// ══════════ API Proxy: Tauri → Rust HTTP, Browser → direct ══════════
// 部署时在此填入你的服务器配置:
// 部署时修改为你的服务器地址和API令牌
const API_TOKEN = '';                  // 填入 DOJO_API_TOKEN
const SERVER_HOST = 'localhost:8000';  // 填入服务器地址
const T=window.__TAURI_INTERNALS__||window.__TAURI__;
const IS_TAURI=!!T;
const _fetch=window.fetch;
window.fetch=function(url,opts){
  if(typeof url==='string'&&url.startsWith('/')){
    if(IS_TAURI){
      const m=(opts&&opts.method)||'GET';
      const b=(opts&&opts.body)||'';
      const cmd=m==='POST'?'api_post':m==='PATCH'?'api_patch':m==='DELETE'?'api_delete':'api_get';
      return T.invoke(cmd,{url:url,bodyStr:typeof b==='string'?b:'',token:API_TOKEN}).then(r=>new Response(r.body,{status:r.status}));
    }
    const headers={}; if(API_TOKEN)headers['Authorization']='Bearer '+API_TOKEN;
    return _fetch('http://'+SERVER_HOST+url,Object.assign({},opts||{},{headers:Object.assign(headers,(opts&&opts.headers)||{})}));
  }
  return _fetch(url,opts);
};

// ══════════ CLASSICAL DATE ══════════
const SOLAR_TERMS_2026 = {
  '2026-01-05':'小寒','2026-01-20':'大寒','2026-02-04':'立春','2026-02-18':'雨水',
  '2026-03-05':'惊蛰','2026-03-20':'春分','2026-04-05':'清明','2026-04-20':'谷雨',
  '2026-05-05':'立夏','2026-05-21':'小满','2026-06-05':'芒种','2026-06-21':'夏至',
  '2026-07-07':'小暑','2026-07-22':'大暑','2026-08-07':'立秋','2026-08-23':'处暑',
  '2026-09-07':'白露','2026-09-23':'秋分','2026-10-08':'寒露','2026-10-23':'霜降',
  '2026-11-07':'立冬','2026-11-22':'小雪','2026-12-07':'大雪','2026-12-22':'冬至',
  '2027-01-05':'小寒','2027-01-20':'大寒','2027-02-04':'立春'
};
const FESTIVALS_LUNAR = {
  '1-1':'春节','1-15':'元宵','2-2':'龙抬头','5-5':'端午','7-7':'七夕','7-15':'中元',
  '8-15':'中秋','9-9':'重阳','12-30':'除夕','12-29':'除夕'
};
const CHINESE_NUMS=['零','一','二','三','四','五','六','七','八','九','十'];
function lunarDayName(d){if(d===1)return'初一';if(d<=10)return'初'+CHINESE_NUMS[d];if(d===20)return'二十';if(d===30)return'三十';const tens=Math.floor(d/10),ones=d%10;return(tens===1?'十':CHINESE_NUMS[tens]+'十')+(ones?CHINESE_NUMS[ones]:'');}

function getLunarDate(d){
  try{
    if(!d)d=new Date();
    // Gregorian
    const gy=d.getFullYear(),gm=d.getMonth()+1,gdd=d.getDate();
    const weekNames=['日','一','二','三','四','五','六'];
    const greg=`${gy}年${gm}月${gdd}日 星期${weekNames[d.getDay()]}`;
    // Lunar via Intl
    const fmt=new Intl.DateTimeFormat('zh-CN-u-ca-chinese',{year:'numeric',month:'numeric',day:'numeric'});
    const parts=fmt.formatToParts(d);
    let ry=gy,lm='',ldd=0;
    for(const p of parts){
      if(p.type==='relatedYear')ry=parseInt(p.value)||gy;
      else if(p.type==='month')lm=p.value;
      else if(p.type==='day')ldd=parseInt(p.value)||0;
    }
    // Heavenly stems & earthly branches
    const tg=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
    const dz=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    const idx=((ry-4)%60+60)%60;
    const ganzhi=`${tg[idx%10]}${dz[idx%12]}`;
    // Lunar month number
    const lunarMonths=['正','二','三','四','五','六','七','八','九','十','十一','十二'];
    let lmNum=0;
    for(let i=0;i<lunarMonths.length;i++){if(lm.includes(lunarMonths[i])){lmNum=i+1;break;}}
    const lunarStr=`农历${lm}${lunarDayName(ldd||parseInt(ldd))}`;
    // Solar term check
    const dateKey=d.toISOString().slice(0,10);
    const term=SOLAR_TERMS_2026[dateKey]||'';
    // Festival check (lunar date)
    const lKey=lmNum+'-'+ldd;
    const fest=FESTIVALS_LUNAR[lKey]||'';
    // Build display
    let parts2=[`岁次${ganzhi}`,lunarStr];
    if(term)parts2.push(term);
    if(fest)parts2.push(fest);
    return {greg:greg,lunar:parts2.join(' · '),term:term,fest:fest};
  }catch(e){return {greg:'',lunar:'',term:'',fest:''};}
}
async function loadChronoStats(){
  try{
    const h=await fetch('/chronicle/history?days=90').then(r=>r.json()).catch(()=>[]);
    if(!h||!h.length)return;
    let ws=0,ss=0;
    for(let i=0;i<h.length;i++){if(h[i].wake_time)ws++;else break;}
    for(let i=0;i<h.length;i++){if(h[i].sleep_time)ss++;else break;}
    document.getElementById('streak-wake').textContent=ws||'—';
    document.getElementById('streak-sleep').textContent=ss||'—';
  }catch(e){}
}
function updateChronoSummary(){
  const el=document.getElementById('chrono-summary');

  if(w&&s)el.textContent=`今晨${w.slice(11,16)}即起 · 昨夜${s.slice(11,16)}安寝`;
  else if(w)el.textContent=`今晨${w.slice(11,16)}即起`;
  else if(s)el.textContent=`昨夜${s.slice(11,16)}安寝`;
  else el.textContent='';
}

let chronoType='wake';
function openChronoModal(type){
  // Block if already recorded today
  if(S.chronicle&&type==='wake'&&S.chronicle.wake_time){toast('今日已记录起床');return}
  if(S.chronicle&&type==='sleep'&&S.chronicle.sleep_time){toast('今日已记录入睡');return}
  chronoType=type;
  const now=new Date();
  const timeStr=now.toTimeString().slice(0,5);
  document.getElementById('chrono-modal-title').textContent=type==='wake'?'记录起床':'记录入睡';
  document.getElementById('chrono-modal-icon').textContent=type==='wake'?'起':'寐';
  document.getElementById('chrono-modal-time').textContent=timeStr;
  document.getElementById('chrono-time-input').value=timeStr;
  document.getElementById('chrono-modal-date').textContent=`${today()} · ${['日','一','二','三','四','五','六'][now.getDay()]}曜日`;
  const warn=document.getElementById('chrono-voice-warn');
  if(type==='sleep'){checkVoiceToday().then(v=>{warn.style.display=v?'none':'block';});}
  else{warn.style.display='none';}
  document.getElementById('chrono-modal').classList.remove('hidden');
}
function closeChronoModal(){document.getElementById('chrono-modal').classList.add('hidden');}
async function checkVoiceToday(){
  try{
    const logs=await fetch('/voice/logs').then(r=>r.json()).catch(()=>[]);
    return Array.isArray(logs)&&logs.some(l=>l.created_date===today());
  }catch(e){return false;}
}
async function confirmChrono(){
  const time=document.getElementById('chrono-time-input').value;
  if(!time)return;
  const now=new Date();
  // 5AM cutoff: sleep between 00:00-04:59 belongs to previous day
  let recordDate=today();
  if(chronoType==='sleep'){
    const h=now.getHours();
    if(h<5)recordDate=new Date(now.getTime()-86400000).toISOString().slice(0,10);
  }
  const endpoint=chronoType==='wake'?'/chronicle/wake':'/chronicle/sleep';
  try{
    await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({time:time,record_date:recordDate})});
    toast(chronoType==='wake'?'已记录起床':'已记录入睡');
    closeChronoModal();
    const c=await fetch('/chronicle/today').then(r=>r.json());
    if(c){S.chronicle=c;renderChron();}
  }catch(e){toast('记录失败');}
}
async function loadQuote(){
  let q=null;
  // Check for festival/term first
  const ld=getLunarDate();
  const special=ld.term||ld.fest||'';
  const cacheKey=QK+'_'+today();
  if(special){
    try{const r=localStorage.getItem(cacheKey);if(r){const c=JSON.parse(r);if(c.date===today())q=c.data;}}catch(e){}
    if(!q){
      const kind=ld.term?'term':'festival';
      q=await fetch(`/daily-quote/festival-quote?name=${encodeURIComponent(special)}&kind=${kind}`).then(r=>r.json()).catch(()=>null);
      if(q)try{localStorage.setItem(cacheKey,JSON.stringify({date:today(),data:q}))}catch(e){}
    }
  }
  // Fallback to classics DB
  if(!q){
    try{const r=localStorage.getItem(QK);if(r){const c=JSON.parse(r);if(c.date===today())q=c.data;}}catch(e){}
    if(!q){q=await fetch('/daily-quote').then(r=>r.json()).catch(()=>null);if(q)try{localStorage.setItem(QK,JSON.stringify({date:today(),data:q}))}catch(e){}}
  }
  if(q){
    document.getElementById('home-quote').textContent=q.quote;
    document.getElementById('home-quote-src').textContent=`— ${q.source_work||q.source_pdf||'—'}`;
    document.getElementById('home-quote-badge').textContent=special||q.source_work||q.source_pdf||'—';
  }
}

async function completeTask(id,row,btn){
  btn.disabled=true;
  const r=await fetch(`/tasks/${id}/complete`,{method:'PATCH'});
  if(!r.ok){btn.disabled=false;toast('请勿重复打卡');return}

  toast(d.message||'打卡成功');

function pcmToWAV(audioBuffer){
  const numChannels=audioBuffer.numberOfChannels;
  const sampleRate=audioBuffer.sampleRate;
  const length=audioBuffer.length;
  const bitsPerSample=16;
  const data=audioBuffer.getChannelData(0);
  const buffer=new ArrayBuffer(44+length*2);
  const view=new DataView(buffer);
  function w(s,o){view.setUint32(o,s,true)}function ws(s,o){view.setUint16(o,s,true)}
  w(0x46464952,0);w(36+length*2,4);w(0x45564157,8);w(0x20746D66,12);w(16,16);ws(1,20);ws(numChannels,22);w(sampleRate,24);w(sampleRate*numChannels*bitsPerSample/8,28);ws(numChannels*bitsPerSample/8,32);ws(bitsPerSample,34);w(0x61746164,36);w(length*numChannels*bitsPerSample/8,40);
  let offset=44;
  for(let i=0;i<length;i++){const s=Math.max(-1,Math.min(1,data[i]));view.setInt16(offset,s<0?s*0x8000:s*0x7FFF,true);offset+=2;}
  return buffer;
}
async function toggleRecording(){
  if(mr&&mr.state==='recording'){mr.stop();return}
  try{as=await navigator.mediaDevices.getUserMedia({audio:true});}catch(e){toast('无法访问麦克风');return}
  chunks=[];mr=new MediaRecorder(as);
  mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)};
  mr.onstop=async()=>{
    as.getTracks().forEach(t=>t.stop());
    setRecState('up');
    try{
      // 转 WAV (WebKit 只支持 PCM)
      const rawBlob=new Blob(chunks);
      const ctx=new AudioContext();
      const pcm=await ctx.decodeAudioData(await rawBlob.arrayBuffer());
      const wav=pcmToWAV(pcm);
      const blob=new Blob([wav],{type:'audio/wav'});
      const fn='r_'+Date.now()+'.wav';
      let r;
      if(IS_TAURI){
        const reader=new FileReader();
        const b64=await new Promise((resolve,reject)=>{reader.onload=()=>resolve(reader.result.split(',')[1]);reader.onerror=reject;reader.readAsDataURL(blob);});
        r=await T.invoke('api_upload',{url:'/voice/upload',fileDataB64:b64,filename:fn,token:API_TOKEN});
        r=new Response(r.body,{status:r.status});
      }else{
        const f=new FormData();f.append('file',blob,fn);
        r=await _fetch('http://'+SERVER_HOST+'/voice/upload',{method:'POST',body:f,headers:API_TOKEN?{'Authorization':'Bearer '+API_TOKEN}:{}});
      }
      if(!r.ok){const e2=await r.text().catch(()=>'');throw new Error(`HTTP ${r.status}: ${e2.slice(0,100)}`)}
      const d=await r.json();
      const a=d.analysis||{};
      document.getElementById('rec-result').innerHTML=
        `<div style="font-size:13px;color:var(--ink);margin-bottom:6px;font-weight:500">${esc(a.emotion_state||d.emotion_state||'已记录')}</div>`+
        (a.core_event?`<div style="font-size:12px;color:var(--mu);margin-bottom:6px;line-height:1.5">${esc(a.core_event)}</div>`:'')+
        (a.reproof?`<div style="font-size:13px;color:var(--fail);font-style:italic;line-height:1.6">${esc(a.reproof)}</div>`:'');
      document.getElementById('rec-result').style.display='block';
      toast('分析完成');loadVoiceLogs();
    }catch(e){toast('上传失败: '+(e.message||e));console.error(e)}
    setRecState('idle');
  };
  mr.start();setRecState('rec');
}
function setRecState(s){

let _currentAudio=null, _loadingId=null;
async function playVoice(id){
  if(_loadingId===id)return;
  if(_currentAudio){_currentAudio.pause();_currentAudio=null;}
  _loadingId=id;
  const btn=document.querySelector('button[onclick*="playVoice('+id+')"]');
  if(btn){btn.textContent='加载中…';btn.disabled=true;}
  try{
    const buf=await T.invoke('api_get_audio',{url:'/voice/audio/'+id,token:API_TOKEN});
    const arr=Array.isArray(buf)?buf:(buf instanceof ArrayBuffer?new Uint8Array(buf):null);
    if(!arr||arr.length<100) throw new Error('empty');
    const blob=new Blob([new Uint8Array(arr)],{type:'audio/wav'});
    const a=new Audio(URL.createObjectURL(blob));
    _currentAudio=a;
    a.onended=a.onerror=()=>{_currentAudio=null;};
    await a.play();
  }catch(e){toast('回放失败');}
  _loadingId=null;
  if(btn){btn.textContent='▶ 回放';btn.disabled=false;}
}

  await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({time:time,record_date:date})});

  const c=await fetch('/chronicle/today').then(r=>r.json());
  if(c){S.chronicle=c;renderChron();}
}
async function adminForceRecalc(){
  await fetch('/tasks/1/complete',{method:'PATCH'}).catch(()=>{});
  S.cult=await fetch('/cultivation').then(r=>r.json());renderCult();
  toast('已刷新功过格');
}
async function adminExportClassics(){
  toast('正在导出…');try{
    const r=await fetch('/daily-quote/export');const blob=await r.blob();
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='dojo_classics.json';a.click();toast('导出完成');
  }catch(e){toast('导出失败');}
}
async function adminImportClassics(input){
  const file=input.files[0];if(!file)return;
  toast('正在导入…');try{
    const text=await file.text();const entries=JSON.parse(text);
    const arr=Array.isArray(entries)?entries:(entries.entries||[]);
    const r=await fetch('/daily-quote/import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({entries:arr})});
    const d=await r.json();toast(d.message||'导入完成');
  }catch(e){toast('导入失败: '+e.message);}
}
function adminExportDB(){
  window.open('/chronicle/history?days=365','_blank');
  toast('数据已在后台打开');
}

// ══════════ UTILS ══════════
function today(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('on');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('on'),2200)}
// ══════════ BOOT ══════════
document.addEventListener('DOMContentLoaded',init);
function recordWake(){openChronoModal('wake');}
function recordSleep(){openChronoModal('sleep');}
if('serviceWorker' in navigator){navigator.serviceWorker.register('/static/sw.js')}
